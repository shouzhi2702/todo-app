<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑待办 - Todo App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>编辑待办事项</h1>
    </header>

    <div class="add-form">
        <form th:action="@{/todos/{id}/update(id=${todo.id})}" th:object="${todo}" method="post">
            <div class="form-group">
                <label for="title">标题</label>
                <input type="text" id="title" th:field="*{title}" required>
                <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>
            <div class="form-group">
                <label for="description">描述（可选）</label>
                <textarea id="description" th:field="*{description}" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="category">分类</label>
                <select id="category" th:field="*{category}">
                    <option th:each="cat : ${T(com.shouzhi.todo.entity.Category).values()}"
                            th:value="${cat}" th:text="${cat.label}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
